<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Carrusel Vertical de Publicidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #ff00ff;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(0, 229, 255, 0.3);
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor del Carrusel */
        .ad-sidebar {
            width: 200px;
            height: 600px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Título de Publicidad */
        .ad-header {
            background: rgba(0, 229, 255, 0.1);
            text-align: center;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--neon-blue);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            position: relative;
        }

        /* El carril que se mueve */
        .ad-rail {
            display: flex;
            flex-direction: column;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* Cada imagen de publicidad */
        .ad-item {
            min-height: 250px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
            box-sizing: border-box;
        }

        .ad-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        .ad-item span {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        /* Efecto de luz de escaneo (Scanlines) opcional */
        .ad-sidebar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div class="ad-sidebar">
        <div class="ad-header">SPONSORS & ADS</div>
        <div class="ad-rail" id="adRail">
            <!-- Imagen 1 -->
            <div class="ad-item">
                <img src="C:\Users\gabri\.gemini\antigravity\brain\be8e86a9-3842-44de-826a-8793ccc7ddce\ad_sports_drink_png_1773233694038.png"
                    alt="Ad 1">
                <span>STAMINA DRINK</span>
            </div>
            <!-- Imagen 2 -->
            <div class="ad-item">
                <img src="C:\Users\gabri\.gemini\antigravity\brain\be8e86a9-3842-44de-826a-8793ccc7ddce\ad_boots_png_1773233710095.png"
                    alt="Ad 2">
                <span>NEW VELOCITY BOOTS</span>
            </div>
            <!-- Imagen 3 -->
            <div class="ad-item">
                <img src="C:\Users\gabri\.gemini\antigravity\brain\be8e86a9-3842-44de-826a-8793ccc7ddce\ad_stadium_png_1773233752452.png"
                    alt="Ad 3">
                <span>NEO STADIUM TICKETS</span>
            </div>
            <!-- Imagen 4 -->
            <div class="ad-item">
                <img src="C:\Users\gabri\.gemini\antigravity\brain\be8e86a9-3842-44de-826a-8793ccc7ddce\ad_energy_bar_png_1773233769901.png"
                    alt="Ad 4">
                <span>POWER BAR X</span>
            </div>
            <!-- Imagen 5 -->
            <div class="ad-item">
                <img src="C:\Users\gabri\.gemini\antigravity\brain\be8e86a9-3842-44de-826a-8793ccc7ddce\ad_vr_game_png_1773233785455.png"
                    alt="Ad 5">
                <span>VR LEAGUE 2026</span>
            </div>
        </div>
    </div>

    <script>
        const rail = document.getElementById('adRail');
        let index = 0;
        const totalItems = 5;
        const itemHeight = 250; // Debe coincidir con min-height de .ad-item

        function rotateAds() {
            index++;
            if (index >= totalItems) {
                index = 0; // Reinicia al inicio
            }

            const offset = -index * itemHeight;
            rail.style.transform = `translateY(${offset}px)`;
        }

        // Cambia cada 4 segundos
        setInterval(rotateAds, 4000);
    </script>
</body>

</html>
